# ================================================================
# Phase 1 sniper config.
# Consumed by main.py, run_periods.py, and (via build_engine) optimizer.py.
# ================================================================

trading:
  symbol: "BTC"              # Phase 1 primary: BTC. Also BTC/ETH universe.
  timeframe: "15m"

risk:
  # Vol targeting — default primary sizer
  target_annual_vol: 0.20    # target ~20% annualized account vol
  max_position_pct: 0.25     # hard cap per trade
  max_concurrent_positions: 1

  # Kill switches
  daily_loss_limit_pct: 0.03
  consecutive_loss_limit: 3
  consecutive_loss_cooloff_seconds: 3600
  weekly_drawdown_halve_pct: 0.08
  tripwire_file: "halt.flag" # delete the file to resume; touch it to halt

  # Optional fractional-Kelly overlay (0.0 = disabled)
  kelly_fraction: 0.0

# Regime gate — skip in chop
regime:
  adx_period: 14
  adx_threshold: 20.0        # skip below this
  hurst_window: 200
  hurst_threshold: 0.50      # skip below this
  rv_window: 96              # 24h at 15m
  rv_hist_window: 2880       # 30d rolling for quintile bucketing

# Snipe signal engine — breakouts + microstructure
snipe:
  lookback_candles: 300
  donchian_period: 20
  keltner_period: 20
  keltner_atr_mult: 2.0
  atr_period: 14
  stop_atr_mult: 1.5
  target_atr_mult: 3.0       # 2:1 R:R
  supertrend_period: 10
  supertrend_mult: 3.0
  funding_veto_pct_hourly: 0.0003   # 0.03%/hr — veto longs > this, shorts < -this
  composite_threshold: 0.0          # require composite score >= 0 (not net negative)

# Execution quality — post-only first, taker fallback
execution:
  post_only_first: true
  taker_timeout_ms: 3000     # drop to taker after this
  retreat_bps: 10.0          # cancel if mid drifts > this against intent
  max_book_fraction: 0.30    # iceberg: child orders at 30% of top-5 depth
  spread_anomaly_mult: 5.0   # skip new entries when spread > N × rolling median
  enable_taker_fallback: true

# Backtest + cost model
backtest:
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  initial_capital: 10000.0
  fee_rate: 0.00035          # HL taker 3.5 bps per side
  slippage_base_bps: 2.0     # flat component
  slippage_atr_frac: 0.05    # additional: fraction of current ATR
  funding_rate_hourly: 0.0   # fallback when no funding history provided
  use_chandelier_trail: true
  chandelier_atr_mult: 3.0
  max_hold_bars: 0           # 0 = no timeout

# Hyperliquid — credentials come from .env
hyperliquid:
  mainnet: true

# Alerts — webhook URL also falls back to env ALERT_WEBHOOK_URL
alerts:
  webhook_url: ""
