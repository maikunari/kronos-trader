# CBS (ColdBloodedShiller) documented trade log.
#
# Seed corpus for replication-fidelity validation (architecture doc §9.6).
# Populated from screenshots and X posts the operator shares. Grows
# incrementally — do not regenerate, only append.
#
# Each trade captures:
#   ticker / exchange / timeframe      — what the chart showed
#   direction (long|short)
#   entry_date + optional entry_time   — best available; UTC preferred
#   entry_price                         — exact if posted, else approx
#   stop_initial                        — original invalidation
#   stop_current (optional)             — if operator saw stop ratcheted
#   targets: list of price levels (Shiller posts multi-tier TPs)
#   status: open | hit_targets | stopped | partial
#   setup_type: operator's best guess at which of our 6 setups this matches
#   source: where we got this (screenshot date, tweet, group post)
#   notes: free-form context (including runner behavior, partial TPs)
#
# The replication matcher (next session: validation/cbs_replication.py)
# iterates these, pulls HL candles for entry_date ± window, and asks:
# would our bot have fired a matching-direction trigger near entry_date?

trades:
  - id: hype_long_2026_04_05
    ticker: HYPE
    exchange: Hyperliquid  # also KuCoin in some charts
    timeframe: 1h
    direction: long
    entry_date: 2026-04-05
    entry_price_approx: 36.0   # between 35.69 support and 36.11
    stop_initial: 35.69        # below the pink support zone (wick-based)
