    status: open
    setup_type: consolidation_break_then_trend   # matches architecture §4.3 (diagonal breakout) and §4.5 (consolidation-under-resistance)
    source: CBS TradingView screenshots shared 2026-04-18 (chart dated Apr 9 + Apr 13)
    notes: >
      Entry off support zone at 35.69-36.11 after range consolidation.
      Classic CBS pyramiding visible: initial stop at range low 35.69,
